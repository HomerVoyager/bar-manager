# Alembic設定ファイル
# バー管理システム用データベースマイグレーション設定

[alembic]
# マイグレーションスクリプトの場所
script_location = alembic

# マイグレーションファイルのテンプレート
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# タイムゾーン設定
timezone = Asia/Tokyo

# トランケート設定
truncate_slug_length = 40

# 出力エンコーディング
output_encoding = utf-8

# データベース接続URL（環境変数から読み込み）
sqlalchemy.url = postgresql://baruser:barpassword@localhost:5432/bardb

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
