services:
  - type: web
    name: bar-manager-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # Renderダッシュボードで手動設定
      - key: SECRET_KEY
        sync: false   # Renderダッシュボードで手動設定
      - key: ALLOWED_ORIGINS_EXTRA
        sync: false   # VercelのURLを設定（例: https://bar-manager.vercel.app）
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.0"
